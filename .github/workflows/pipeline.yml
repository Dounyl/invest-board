name: build-and-deploy-aliyun

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: aliyun-deploy
  cancel-in-progress: false

env:
  ALIYUN_HOST: 139.196.37.239
  ALIYUN_USER: admin
  ALIYUN_PORT: "22"
  ALIYUN_APP_PATH: /opt/invest-board
  ALIYUN_WEB_PATH: /var/www/invest-board
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.ALIYUN_SSH_KEY }}" > ~/.ssh/aliyun_deploy_key
          chmod 600 ~/.ssh/aliyun_deploy_key
          ssh-keyscan -p "$ALIYUN_PORT" "$ALIYUN_HOST" >> ~/.ssh/known_hosts

      - name: Ensure remote directories
        run: |
          ssh -i ~/.ssh/aliyun_deploy_key -p "$ALIYUN_PORT" "$ALIYUN_USER@$ALIYUN_HOST" \
            "mkdir -p '$ALIYUN_APP_PATH' '$ALIYUN_WEB_PATH'"

      - name: Sync app code to Aliyun
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/aliyun_deploy_key -p $ALIYUN_PORT" \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".codex/" \
            --exclude ".opencode/" \
            --exclude "data/" \
            --exclude "web/node_modules/" \
            --exclude "web/dist/" \
            ./ "$ALIYUN_USER@$ALIYUN_HOST:$ALIYUN_APP_PATH/"

      - name: Deploy static site to Aliyun
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/aliyun_deploy_key -p $ALIYUN_PORT" \
            --exclude "data/" \
            web/dist/ "$ALIYUN_USER@$ALIYUN_HOST:$ALIYUN_WEB_PATH/"
