name: build-data-and-deploy-pages

on:
  workflow_dispatch:
  schedule:
    # 05:00 Asia/Shanghai every day.
    - cron: "0 21 * * *"
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-data-and-site:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Restore data state
        uses: actions/cache@v4
        with:
          path: |
            data/raw
            data/warehouse
          key: pork-data-${{ github.run_id }}
          restore-keys: |
            pork-data-

      - name: Generate pork exports
        run: |
          node scripts/run_pork_daily.mjs --once

      - name: Copy exports into static public assets
        run: |
          mkdir -p web/public/data/export
          cp -R data/export/* web/public/data/export/

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        env:
          VITE_BASE_PATH: /invest-board/
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
