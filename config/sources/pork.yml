version: v1
domain: pork
source_policy:
  raw_append_only: true
  stock_price: exchange_page_or_authorized_market_data_only
  third_party_market_data_allowed: false
sources:
  - source_id: exchange_or_authorized_market_data
    name: 交易所页面或授权行情源
    enabled: true
    schedule: trading_day
    data_family: stock
    endpoints: []
    storage:
      format: jsonl
      path: data/raw/pork/muyuan_stock_price
    notes: 第一版禁止使用第三方行情数据源；真实接入前先替换为授权源适配器。
  - source_id: ndrc_price_monitoring_center
    name: 国家发改委价格监测中心
    enabled: true
    schedule: weekly
    data_family: industry
    endpoints: []
    storage:
      format: jsonl
      path: data/raw/pork/live_hog_ex_factory_price
    notes: 全国生猪出场价格第一来源。
  - source_id: mara_or_nbs
    name: 农业农村部或国家统计局公开数据
    enabled: true
    schedule: monthly
    data_family: industry
    endpoints: []
    storage:
      format: jsonl
      path: data/raw/pork/breeding_sow_inventory
    notes: 全国能繁母猪存栏来源。
  - source_id: cninfo_announcements
    name: 巨潮资讯上市公司公告
    enabled: true
    schedule: daily
    data_family: announcement
    endpoints: []
    storage:
      format: jsonl
      path: data/raw/pork/leading_pork_company_cost_range
    notes: 公司披露成本区间来源。
  - source_id: cninfo_periodic_reports
    name: 巨潮资讯定期报告
    enabled: true
    schedule: daily
    data_family: financial
    endpoints: []
    storage:
      format: jsonl
      path: data/raw/pork/leading_pork_company_cash_condition
    notes: 货币资金、短债、经营现金流和资产负债率来源。
